name: Daily Competitor News Update

on:
  schedule:
    # 每天北京时间 20:00 (UTC 12:00)
    - cron: "0 12 * * *"
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run collector
        run: python scripts/collector.py

      - name: Ensure data updated
        run: |
          if [ ! -f data/latest.json ]; then
            echo '{"collected_at":"'$(date -Iseconds)'","total_updates":0}' > data/latest.json
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update: $(date -u '+%Y-%m-%d')"
            git push
          fi
