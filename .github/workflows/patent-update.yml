name: Weekly Patent Data Update

on:
  schedule:
    # 每周一北京时间 20:00 (UTC 12:00, day=1=Monday)
    - cron: "0 12 * * 1"
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  patent_update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run patent collector
        run: python scripts/patent_collector.py
        continue-on-error: true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/companies.json || true
          if git diff --cached --quiet; then
            echo "No patent changes to commit"
          else
            git commit -m "Patent update: $(date -u '+%Y-%m-%d')"
            git push
          fi
